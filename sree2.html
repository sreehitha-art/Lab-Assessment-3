<!DOCTYPE html> 
<html> 
<head> 
<script> 
// Function with parameter to change background color 
function change Color(color) { 
    document .body .style. background Color = color; 
} 
</script> 
</head> 
 
<body> 
 
<!-- Buttons passing different colors --> 
<button onclick="change Color('red')">Red</button> 
<button onclick="change Color('green')">Green</button> 
<button onclick="change Color('blue')">Blue</button> 
 
</body> 
</html>
