<!DOCTYPE html> 
<html> 
<body> 
 
<p id="output"></p> 
 
<script> 
// Integer calculation 
var length = 10; 
var breadth = 5; 
var area1 = length * breadth; 
 
// Float calculation (demonstrates loose typing) 
length = 10.5; 
breadth = 5.5; 
var area2 = length * breadth; 
 
// Display result 
document.getElementById("output").innerHTML = 
"Integer Area: " + area1 + "<br>Float Area: " + area2; 
</script> 
 
</body> 
</html>
