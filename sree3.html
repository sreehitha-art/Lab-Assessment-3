<!DOCTYPE html> 
<html> 
<head> 
<script> 
// Function to generate email 
function generateEmail(form) { 
 
    // Get values from form fields 
    let first = form.fname.value; 
    let last = form.lname.value; 
 
    // Concatenate to form email 
    let email = first + "." + last + "@park.edu"; 
 
    // Display email 
    document.getElementById("result").innerHTML = email; 
 
    // Reset form 
    form.reset(); 
 
    // Set focus back to first field 
    form.fname.focus(); 
} 
</script> 
</head> 
 
<body> 
 
<form> 
First Name: <input type="text" name="fname"><br> 
Last Name: <input type="text" name="lname"><br> 
 
<!-- Button calls function --> 
<button type="button" onclick="generateEmail(this.form)">Generate</button> 
</form> 
 
<p id="result"></p> 
 
</body> 
</html>
