<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Overlapping Image Gallery</title> 
    <style> 
        body { font-family: sans-serif; height: 100vh; overflow: hidden; background-color: #f0f0f0; } 
         
        .gallery-container { position: relative; width: 100%; height: 100%; } 
 
        /* Absolute positioning is required for overlapping */ 
        img { 
            position: absolute; 
            width: 300px; 
            height: 200px; 
            border: 5px solid white; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); 
            cursor: pointer; 
            transition: transform 0.2s; 
        } 
 
        /* Initial positions for the images */ 
        #img1 { top: 50px; left: 50px; background-color: #ffcccc; } 
        #img2 { top: 100px; left: 150px; background-color: #ccffcc; } 
        #img3 { top: 150px; left: 250px; background-color: #ccccff; } 
    </style> 
</head> 
<body> 
 <h3>Click an image to bring it to the front</h3> 
 
    <div class="gallery-container"> 
        <img id="img1" src="https://picsum.photos/300/200?random=1" onclick="bringToFront(this)"> 
        <img id="img2" src="https://picsum.photos/300/200?random=2" onclick="bringToFront(this)"> 
        <img id="img3" src="https://picsum.photos/300/200?random=3" onclick="bringToFront(this)"> 
    </div> 
 
    <script> 
        // Global variable for tracking top index 
        let topIndex = 1; 
 
        function bringToFront(element) { 
            /** * Using prefix increment operator (++topIndex). 
             * This increments the global variable first,  
             * then assigns the new value to the element's zIndex. 
             */ 
            element.style.zIndex = ++topIndex; 
             
            // Optional: Subtle visual feedback 
            console.log("Current Top Z-Index: " + topIndex); 
        } 
    </script> 
 
</body> 
</html>
